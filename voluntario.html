<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Voluntário</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #d95353;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 760px;
      background-color: #df7474;
      border-radius: 18px;
      padding: 28px 30px 80px;
      position: relative;
    }

    .descricao {
      color: white;
      font-size: 20px;
      font-weight: bold;
      line-height: 1.4;
      margin-bottom: 30px;
      max-width: 600px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 16px;
      font-weight: bold;
      color: #111;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      height: 42px;
      border: none;
      border-radius: 10px;
      background-color: #d9d9d9;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
    }

    .btn-enviar {
      display: block;
      width: 400px;
      max-width: 100%;
      margin: 36px auto 0;
      height: 42px;
      border: none;
      border-radius: 12px;
      background-color: #d9d9d9;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-voltar {
      position: absolute;
      right: 16px;
      bottom: 16px;
      width: 115px;
      height: 40px;
      border: none;
      border-radius: 14px;
      background-color: #d9d9d9;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="descricao">
      Para ser um voluntário(a) você terá que se cadastrar no nosso site
      para que você possa ajudar nossa missão:
    </p>

    <form>
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" />
      </div>

      <div class="form-group">
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" />
      </div>

      <div class="form-group">
        <label for="cep">Cep:</label>
        <input type="text" id="cep" name="cep" />
      </div>

      <div class="form-group">
        <label for="rua">Rua:</label>
        <input type="text" id="rua" name="rua" />
      </div>

      <div class="form-group">
        <label for="complemento">Complemento:</label>
        <input type="text" id="complemento" name="complemento" />
      </div>

      <div class="form-group">
        <label for="numero">Numero:</label>
        <input type="text" id="numero" name="numero" />
      </div>

      <button type="submit" class="btn-enviar">Enviar</button>
      <button type="button" class="btn-voltar" onclick="history.back()">Voltar</button>
    </form>
  </div>
</body>
</html>
